server {
    listen 80;
    listen [::]:80;
    server_name hub.ericfromkorea.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hub.ericfromkorea.com;

    ssl_certificate     /etc/letsencrypt/live/hub.ericfromkorea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.ericfromkorea.com/privkey.pem;

    access_log /var/log/nginx/hub-access.log;
    error_log  /var/log/nginx/hub-error.log;

    location / {
        proxy_pass http://localhost:60022;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
