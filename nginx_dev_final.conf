server {
    listen 80;
    listen [::]:80;
    server_name dev.ericfromkorea.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dev.ericfromkorea.com;

    ssl_certificate     /etc/letsencrypt/live/dev.ericfromkorea.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.ericfromkorea.com/privkey.pem;

    access_log /var/log/nginx/dev-portfolio-access.log;
    error_log /var/log/nginx/dev-portfolio-error.log;

    location / {
        proxy_pass http://localhost:60022;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
