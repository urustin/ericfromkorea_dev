<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f5f4;
    --ink: #1c1917;
    --muted: #78716c;
    --line: #d6d3d1;
    --card: #ffffff;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  main {
    width: min(560px, 100%);
    margin: 0 auto;
    padding: 48px 18px 64px;
  }
  header { margin-bottom: 24px; }
  h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.15; font-weight: 700; }
  .intro { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .links { display: grid; gap: 10px; }
  a.card {
    display: block;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    color: inherit;
    text-decoration: none;
    transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  a.card:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(37,99,235,.10);
    transform: translateY(-1px);
  }
  .title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
    font-size: 16px;
    font-weight: 650;
  }
  .url { color: var(--accent); font-size: 12px; font-weight: 500; white-space: nowrap; }
  .desc { margin: 5px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
  footer { margin-top: 22px; color: var(--muted); font-size: 12px; }
  @media (max-width: 460px) {
    main { padding-top: 32px; }
    .title { display: block; }
    .url { display: block; margin-top: 4px; white-space: normal; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>{{TITLE}}</h1>
    <p class="intro">{{INTRO}}</p>
  </header>
  <section class="links" aria-label="링크">
{{CARDS}}
  </section>
  <footer>{{FOOTER}}</footer>
</main>
</body>
</html>
