<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 빨간 박스 (좌표 기반 파일명)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>이미지 빨간 박스</h1>
      <p class="sub">이미지를 올리고 드래그해 영역을 선택한 뒤, 회전 슬라이더로 각도를 조절하면
        1px 빨간(R255) 테두리 사각형(회전 가능)을 그려 <code>파일명_posX_posY.png</code> 로 내려받습니다.
        (posX/posY = 회전 전 박스 좌상단, 이미지 좌상단 기준 픽셀)</p>
      <nav class="nav">
        <a href="/image-cropper-with-pos/">← 크롭</a>
        <span class="nav-cur">빨간 박스 그리기</span>
      </nav>
    </header>

    <!-- 업로드 영역 -->
    <label id="drop" class="drop" for="file">
      <input type="file" id="file" accept="image/*" hidden />
      <span class="drop-msg">클릭하거나 이미지를 끌어다 놓으세요</span>
    </label>

    <!-- 작업 영역 (이미지 로드 후 표시) -->
    <section id="stage" class="stage" hidden>
      <div id="canvasBox" class="canvas-box">
        <img id="img" alt="업로드한 이미지" />
        <div id="sel" class="sel" hidden></div>
      </div>
      <div class="bar">
        <span id="info" class="info">영역을 드래그하세요</span>
        <label class="angle" title="빨간 박스 회전 각도">
          회전
          <input id="angle" type="range" min="-180" max="180" value="0" step="1" disabled />
          <span id="angleVal">0°</span>
        </label>
        <div class="actions">
          <button id="reset" type="button" class="btn ghost">다른 이미지</button>
          <button id="download" type="button" class="btn" disabled>빨간 박스 추가 후 다운로드</button>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
